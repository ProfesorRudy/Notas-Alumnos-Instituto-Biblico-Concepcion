<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Calificaciones</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 560px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 1.5rem; color: #1a1a2e; font-weight: 700; margin-bottom: 0.3rem; }
  .header p { font-size: 0.9rem; color: #666; }
  .card { background: #fff; border-radius: 14px; padding: 1.75rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid #f0f0f0; }
  .logo-icon { width: 44px; height: 44px; border-radius: 10px; background: #fff4e0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .logo-text h2 { font-size: 1rem; color: #1a1a2e; font-weight: 700; }
  .logo-text p { font-size: 0.8rem; color: #888; }
  label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; font-weight: 600; }
  .input-row { display: flex; gap: 8px; }
  input[type=text] { flex: 1; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  input[type=text]:focus { border-color: #f5a623; }
  button { padding: 10px 18px; background: #f5a623; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; white-space: nowrap; transition: background 0.2s; }
  button:hover { background: #d4891a; }
  .btn-limpiar { background: none; color: #888; font-size: 0.8rem; padding: 6px 0; margin-top: 6px; display: none; cursor: pointer; }
  .btn-limpiar:hover { color: #333; background: none; }
  .error { background: #fff0f0; border: 1px solid #fcc; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: #c0392b; margin-top: 10px; display: none; }
  .resultado { margin-top: 1.5rem; display: none; }
  .divider { height: 1px; background: #f0f0f0; margin: 1.25rem 0; }
  .alumno-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; background: #fff4e0; color: #f5a623; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .alumno-nombre { font-size: 1rem; font-weight: 700; color: #1a1a2e; }
  .alumno-rut { font-size: 0.82rem; color: #888; margin-top: 2px; }
  .curso-badge { display: inline-block; font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: #fff4e0; color: #f5a623; margin-top: 4px; }
  .notas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .nota-box { background: #f8f9fc; border-radius: 10px; padding: 14px 10px; text-align: center; }
  .nota-label { font-size: 0.75rem; color: #888; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .nota-valor { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; }
  .nota-valor.pendiente { font-size: 0.9rem; color: #bbb; font-weight: 400; }
  .promedio-row { display: flex; align-items: center; justify-content: space-between; background: #f8f9fc; border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; }
  .promedio-label { font-size: 0.85rem; color: #666; font-weight: 600; }
  .promedio-valor { font-size: 1.4rem; font-weight: 700; }
  .estado-badge { font-size: 0.8rem; font-weight: 700; padding: 5px 14px; border-radius: 99px; }
  .aprobado { background: #e6f9f0; color: #1a9e5c; }
  .reprobado { background: #fff0f0; color: #c0392b; }
  .pendiente-badge { background: #fff8e1; color: #e67e22; }
  .nota-pie { font-size: 0.78rem; color: #aaa; text-align: center; margin-top: 10px; }
  .selector-curso { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 8px; border: 1.5px solid #ddd; border-radius: 8px; background: #fff; color: #888; font-size: 0.82rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
  .tab.active { border-color: #f5a623; background: #fff4e0; color: #f5a623; }
  @media (max-width: 400px) { .notas-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>

function normRut(r) {
  return r.replace(/[\s]/g, '').toUpperCase();
}

function initials(nombre) {
  return nombre.split(/[\s,]+/).filter(Boolean).slice(0,2).map(p => p[0]).join('').toUpperCase();
}

function fmtNota(v) {
  if (v === null || v === undefined) return '<span class="pendiente">Pendiente</span>';
  return v;
}

function buscar() {
  const raw = document.getElementById('rut-input').value.trim();
  const err = document.getElementById('error-msg');
  const res = document.getElementById('resultado');
  err.style.display = 'none';
  res.style.display = 'none';

  if (!raw) {
    err.textContent = 'Por favor ingresa tu RUT.';
    err.style.display = 'block';
    return;
  }

  const rawNorm = normRut(raw);
  const key = Object.keys(alumnos).find(k => normRut(k) === rawNorm);

  if (!key) {
    err.textContent = 'RUT no encontrado. Verifica que esté bien escrito, incluyendo puntos y guión.';
    err.style.display = 'block';
    document.getElementById('btn-limpiar').style.display = 'inline-block';
    return;
  }

  const a = alumnos[key];

  // Calcular promedio solo con notas disponibles
  const notas = [a.t1, a.t2, a.ex].filter(n => n !== null && n !== undefined);
  const prom = notas.length > 0 ? (notas.reduce((s, n) => s + n, 0) / notas.length) : null;
  const aprobado = prom !== null ? prom >= 60 : null;

  document.getElementById('avatar').textContent = initials(a.nombre);
  document.getElementById('alumno-nombre').textContent = a.nombre;
  document.getElementById('alumno-rut-display').textContent = 'RUT: ' + key;
  document.getElementById('curso-badge').textContent = a.curso;

  document.getElementById('n-t1').innerHTML = fmtNota(a.t1);
  document.getElementById('n-t2').innerHTML = fmtNota(a.t2);
  document.getElementById('n-ex').innerHTML = fmtNota(a.ex);

  if (prom !== null) {
    document.getElementById('n-prom').textContent = prom.toFixed(1) + ' pts';
    document.getElementById('n-prom').style.color = aprobado ? '#1a9e5c' : '#c0392b';
    const badge = document.getElementById('badge-estado');
    badge.textContent = aprobado ? '✓ Aprobado' : '✗ Reprobado';
    badge.className = 'estado-badge ' + (aprobado ? 'aprobado' : 'reprobado');
  } else {
    document.getElementById('n-prom').textContent = 'Sin datos';
    document.getElementById('n-prom').style.color = '#aaa';
    const badge = document.getElementById('badge-estado');
    badge.textContent = 'En curso';
    badge.className = 'estado-badge pendiente-badge';
  }

  res.style.display = 'block';
  document.getElementById('btn-limpiar').style.display = 'inline-block';
}

function limpiar() {
  document.getElementById('rut-input').value = '';
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('btn-limpiar').style.display = 'none';
  document.getElementById('rut-input').focus();
}

document.getElementById('rut-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') buscar();
});
document.getElementById('rut-input').addEventListener('input', () => {
  document.getElementById('error-msg').style.display = 'none';
});
