<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Calificaciones</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 560px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 1.5rem; color: #1a1a2e; font-weight: 700; margin-bottom: 0.3rem; }
  .header p { font-size: 0.9rem; color: #666; }
  .card { background: #fff; border-radius: 14px; padding: 1.75rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid #f0f0f0; }
  .logo-icon { width: 44px; height: 44px; border-radius: 10px; background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .logo-text h2 { font-size: 1rem; color: #1a1a2e; font-weight: 700; }
  .logo-text p { font-size: 0.8rem; color: #888; }
  label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; font-weight: 600; }
  .input-row { display: flex; gap: 8px; }
  input[type=text] { flex: 1; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  input[type=text]:focus { border-color: #4361ee; }
  button { padding: 10px 18px; background: #4361ee; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; white-space: nowrap; transition: background 0.2s; }
  button:hover { background: #3451d1; }
  .btn-limpiar { background: none; color: #888; font-size: 0.8rem; padding: 6px 0; margin-top: 6px; display: none; cursor: pointer; }
  .btn-limpiar:hover { color: #333; background: none; }
  .error { background: #fff0f0; border: 1px solid #fcc; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: #c0392b; margin-top: 10px; display: none; }
  .resultado { margin-top: 1.5rem; display: none; }
  .divider { height: 1px; background: #f0f0f0; margin: 1.25rem 0; }
  .alumno-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; background: #e8f0fe; color: #4361ee; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .alumno-nombre { font-size: 1rem; font-weight: 700; color: #1a1a2e; }
  .alumno-rut { font-size: 0.82rem; color: #888; margin-top: 2px; }
  .curso-badge { display: inline-block; font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: #e8f0fe; color: #4361ee; margin-top: 4px; }
  .notas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .nota-box { background: #f8f9fc; border-radius: 10px; padding: 14px 10px; text-align: center; }
  .nota-label { font-size: 0.75rem; color: #888; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .nota-valor { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; }
  .nota-valor.pendiente { font-size: 0.9rem; color: #bbb; font-weight: 400; }
  .promedio-row { display: flex; align-items: center; justify-content: space-between; background: #f8f9fc; border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; }
  .promedio-label { font-size: 0.85rem; color: #666; font-weight: 600; }
  .promedio-valor { font-size: 1.4rem; font-weight: 700; }
  .estado-badge { font-size: 0.8rem; font-weight: 700; padding: 5px 14px; border-radius: 99px; }
  .aprobado { background: #e6f9f0; color: #1a9e5c; }
  .reprobado { background: #fff0f0; color: #c0392b; }
  .pendiente-badge { background: #fff8e1; color: #e67e22; }
  .nota-pie { font-size: 0.78rem; color: #aaa; text-align: center; margin-top: 10px; }
  .selector-curso { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 8px; border: 1.5px solid #ddd; border-radius: 8px; background: #fff; color: #888; font-size: 0.82rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
  .tab.active { border-color: #4361ee; background: #e8f0fe; color: #4361ee; }
  @media (max-width: 400px) { .notas-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📋 Consulta de Calificaciones</h1>
    <p>Ingresa tu RUT para ver tus notas</p>
  </div>
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">🎓</div>
      <div class="logo-text">
        <h2>Sistema de Notas</h2>
        <p>Escala 1 – 100 puntos</p>
      </div>
    </div>

    <label for="rut-input">RUT del estudiante</label>
    <div class="input-row">
      <input type="text" id="rut-input" placeholder="12.345.678-9" maxlength="13" autocomplete="off" />
      <button onclick="buscar()">🔍 Consultar</button>
    </div>
    <button class="btn-limpiar" id="btn-limpiar" onclick="limpiar()">✕ Limpiar búsqueda</button>
    <div class="error" id="error-msg"></div>

    <div class="resultado" id="resultado">
      <div class="divider"></div>
      <div class="alumno-header">
        <div class="avatar" id="avatar"></div>
        <div>
          <div class="alumno-nombre" id="alumno-nombre"></div>
          <div class="alumno-rut" id="alumno-rut-display"></div>
          <span class="curso-badge" id="curso-badge"></span>
        </div>
      </div>

      <div class="notas-grid">
        <div class="nota-box">
          <div class="nota-label">Trabajo 1</div>
          <div class="nota-valor" id="n-t1">—</div>
        </div>
        <div class="nota-box">
          <div class="nota-label">Trabajo 2</div>
          <div class="nota-valor" id="n-t2">—</div>
        </div>
        <div class="nota-box">
          <div class="nota-label">Examen</div>
          <div class="nota-valor" id="n-ex">—</div>
        </div>
      </div>

      <div class="promedio-row">
        <div>
          <div class="promedio-label">Promedio disponible</div>
          <div class="promedio-valor" id="n-prom">—</div>
        </div>
        <span class="estado-badge" id="badge-estado"></span>
      </div>

      <p class="nota-pie">Escala 0 – 100 pts · Nota mínima de aprobación: 60 pts · Las notas "Pendiente" aún no han sido registradas.</p>
    </div>
  </div>
</div>

<script>
const alumnos = {
  "17.615.853-0": { nombre: "Baeza Espinoza, Marlyn",              curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "16.767.543-3": { nombre: "Cifuentes Valdebenito, Jennifer",     curso: "Introducción A.T.",       t1: 0,    t2: 0,    ex: 0    },
  "20.759.687-6": { nombre: "Faúndez Ramírez, Consuelo",           curso: "Introducción A.T.",       t1: 0,    t2: 0,    ex: 0    },
  "11.984.351-0": { nombre: "Gonzalez Contreras, Isabel",          curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "13.788.829-7": { nombre: "Jara Arellano, Boris",                curso: "Introducción A.T.",       t1: 0,    t2: 0,    ex: 0    },
  "9.718.696-0":  { nombre: "Lagos Aburto, Carlos",                curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "10.458.204-4": { nombre: "Osorio Inzunza, Ana Luz",             curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "16.416.923-5": { nombre: "Pérez Ayala, Nadixia Evein",          curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "17.614.372-K": { nombre: "Riquelme Fernández, Herman",          curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "12.526.537-5": { nombre: "Rojas Nuñez, Griselda",               curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "15.157.909-4": { nombre: "Sánchez Cofré, César",                curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "6.688.590-9":  { nombre: "Sanhueza Ascencio, Marcelo",          curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "16.690.272-K": { nombre: "Toloza Lozano, Karen",                curso: "Introducción A.T.",       t1: null, t2: 100,  ex: null },
  "15.865.472-5": { nombre: "Cristian Collio Liguen",              curso: "Filosofía Moderna",       t1: 96,   t2: null, ex: null },
  "20.194.247-0": { nombre: "Pedro Duran Vivanco",                 curso: "Filosofía Moderna",       t1: 20,   t2: null, ex: null },
  "15.180.128-5": { nombre: "Fredy Garrido Paredes",               curso: "Filosofía Moderna",       t1: 100,  t2: null, ex: null },
  "16.155.833-8": { nombre: "Lisandro Macaya Bustamante",          curso: "Filosofía Moderna",       t1: 20,   t2: null, ex: null },
  "18.131.401-K": { nombre: "Francisco Ojeda Nahuelpan",           curso: "Filosofía Moderna",       t1: 100,  t2: null, ex: null },
  "8.188.445-5":  { nombre: "Sergio Guillermo Rebolledo Gallegos", curso: "Filosofía Moderna",       t1: 100,  t2: null, ex: null },
  "10.040.390-0": { nombre: "Urzula Torres Torres",                curso: "Filosofía Moderna",       t1: 100,  t2: null, ex: null },
  "11.986.425-9": { nombre: "María Soledad Ubilla Mendoza",        curso: "Filosofía Moderna",       t1: 80,   t2: null, ex: null },
  "10.544.296-3": { nombre: "Nelson Arismendi Ojeda",              curso: "Filosofía Moderna",       t1: 80,   t2: null, ex: null }
};

function normRut(r) {
  return r.replace(/[\s]/g, '').toUpperCase();
}

function initials(nombre) {
  return nombre.split(/[\s,]+/).filter(Boolean).slice(0,2).map(p => p[0]).join('').toUpperCase();
}

function fmtNota(v) {
  if (v === null || v === undefined) return '<span class="pendiente">Pendiente</span>';
  return v;
}

function buscar() {
  const raw = document.getElementById('rut-input').value.trim();
  const err = document.getElementById('error-msg');
  const res = document.getElementById('resultado');
  err.style.display = 'none';
  res.style.display = 'none';

  if (!raw) {
    err.textContent = 'Por favor ingresa tu RUT.';
    err.style.display = 'block';
    return;
  }

  const rawNorm = normRut(raw);
  const key = Object.keys(alumnos).find(k => normRut(k) === rawNorm);

  if (!key) {
    err.textContent = 'RUT no encontrado. Verifica que esté bien escrito, incluyendo puntos y guión.';
    err.style.display = 'block';
    document.getElementById('btn-limpiar').style.display = 'inline-block';
    return;
  }

  const a = alumnos[key];

  // Calcular promedio solo con notas disponibles
  const notas = [a.t1, a.t2, a.ex].filter(n => n !== null && n !== undefined);
  const prom = notas.length > 0 ? (notas.reduce((s, n) => s + n, 0) / notas.length) : null;
  const aprobado = prom !== null ? prom >= 60 : null;

  document.getElementById('avatar').textContent = initials(a.nombre);
  document.getElementById('alumno-nombre').textContent = a.nombre;
  document.getElementById('alumno-rut-display').textContent = 'RUT: ' + key;
  document.getElementById('curso-badge').textContent = a.curso;

  document.getElementById('n-t1').innerHTML = fmtNota(a.t1);
  document.getElementById('n-t2').innerHTML = fmtNota(a.t2);
  document.getElementById('n-ex').innerHTML = fmtNota(a.ex);

  if (prom !== null) {
    document.getElementById('n-prom').textContent = prom.toFixed(1) + ' pts';
    document.getElementById('n-prom').style.color = aprobado ? '#1a9e5c' : '#c0392b';
    const badge = document.getElementById('badge-estado');
    badge.textContent = aprobado ? '✓ Aprobado' : '✗ Reprobado';
    badge.className = 'estado-badge ' + (aprobado ? 'aprobado' : 'reprobado');
  } else {
    document.getElementById('n-prom').textContent = 'Sin datos';
    document.getElementById('n-prom').style.color = '#aaa';
    const badge = document.getElementById('badge-estado');
    badge.textContent = 'En curso';
    badge.className = 'estado-badge pendiente-badge';
  }

  res.style.display = 'block';
  document.getElementById('btn-limpiar').style.display = 'inline-block';
}

function limpiar() {
  document.getElementById('rut-input').value = '';
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('btn-limpiar').style.display = 'none';
  document.getElementById('rut-input').focus();
}

document.getElementById('rut-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') buscar();
});
document.getElementById('rut-input').addEventListener('input', () => {
  document.getElementById('error-msg').style.display = 'none';
});
</script>
</body>
</html>
