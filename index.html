<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal del Alumno · Instituto Bíblico Concepción</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 640px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 1.75rem; }
.header img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 0.6rem; }
.header h1 { font-size: 1.45rem; color: #1a1a2e; font-weight: 700; margin-bottom: 0.2rem; }
.header .sub1 { color:#888; font-size:0.78rem; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:0.15rem; }
.header .sub2 { font-size: 0.9rem; color: #666; }
.card { background: #fff; border-radius: 14px; padding: 1.75rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; font-weight: 600; }
.input-row { display: flex; gap: 8px; }
input[type=text] { flex: 1; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
input[type=text]:focus { border-color: #f5a623; }
button { padding: 10px 18px; background: #f5a623; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; white-space: nowrap; transition: background 0.2s; }
button:hover { background: #d4891a; }
.error { background: #fff0f0; border: 1px solid #fcc; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: #c0392b; margin-top: 10px; display: none; }
.hint { font-size: 0.78rem; color: #aaa; text-align: center; margin-top: 12px; }

/* ===== Dashboard ===== */
#vista-panel { display: none; }
.alumno-header { display: flex; align-items: center; gap: 14px; }
.avatar { width: 50px; height: 50px; border-radius: 50%; background: #fff4e0; color: #f5a623; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
.alumno-nombre { font-size: 1.05rem; font-weight: 700; color: #1a1a2e; }
.alumno-rut { font-size: 0.82rem; color: #888; margin-top: 2px; }
.btn-salir { background: none; color: #999; border: 1px solid #ddd; font-size: 0.78rem; padding: 6px 12px; margin-left: auto; }
.btn-salir:hover { background: #f5f5f5; color: #555; }

.menu-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 1.25rem 0; }
.tab { padding: 10px 6px; border: 1.5px solid #ddd; border-radius: 10px; background: #fff; color: #888; font-size: 0.78rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; line-height: 1.3; }
.tab:hover { border-color: #f5a623; background:#fff; }
.tab.active { border-color: #f5a623; background: #fff4e0; color: #d4891a; }

/* Asistencia */
.asistencia-summary { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; }
.asistencia-pct { font-size: 1.35rem; font-weight: 700; }
.asistencia-log { display: flex; flex-wrap: wrap; gap: 6px; }
.asistencia-chip { font-size: 0.74rem; font-weight: 600; padding: 5px 10px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; min-width: 62px; }
.asistencia-chip .fecha { font-size: 0.68rem; font-weight: 400; opacity: 0.75; margin-bottom: 1px; }
.presente { background: #e6f9f0; color: #1a9e5c; }
.ausente { background: #fff0f0; color: #c0392b; }
.atraso { background: #fff8e1; color: #e67e22; }

/* Observaciones y Avisos (lista general) */
.aviso-item { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.aviso-fecha { font-size: 0.72rem; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
.aviso-titulo { font-size: 0.9rem; font-weight: 700; color: #1a1a2e; margin-bottom: 3px; }
.aviso-texto { font-size: 0.84rem; color: #555; line-height: 1.4; }
.sin-avisos { font-size: 0.83rem; color: #aaa; text-align: center; padding: 20px 10px; }

/* Horario */
.horario-row { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; flex-wrap: wrap; }
.horario-dia { font-size: 0.85rem; font-weight: 700; color: #1a1a2e; min-width: 78px; }
.horario-hora { font-size: 0.82rem; color: #666; }
.modalidad-badge { font-size: 0.72rem; font-weight: 700; padding: 4px 10px; border-radius: 99px; margin-left: auto; }
.presencial { background: #eaf1ff; color: #2b6cb0; }
.online { background: #f3e8ff; color: #8033c9; }
.hibrido { background: #fff4e0; color: #d4891a; }
.horario-lugar { font-size: 0.78rem; color: #999; width: 100%; }

.curso-card { background: #f8f9fc; border-radius: 12px; padding: 1.1rem 1.2rem; margin-bottom: 14px; }
.curso-titulo { display:flex; align-items:center; gap:8px; font-size: 0.95rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.85rem; }
.curso-badge { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: #fff4e0; color: #d4891a; }

/* Materiales */
.material-item { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
.material-icon { font-size: 1.3rem; flex-shrink: 0; }
.material-info { flex: 1; min-width: 0; }
.material-nombre { font-size: 0.88rem; font-weight: 600; color: #1a1a2e; }
.material-desc { font-size: 0.76rem; color: #999; margin-top: 1px; }
a.btn-descargar { text-decoration: none; background: #f5a623; color: #fff; font-size: 0.78rem; font-weight: 600; padding: 7px 14px; border-radius: 8px; white-space: nowrap; transition: background 0.2s; }
a.btn-descargar:hover { background: #d4891a; }
.sin-materiales { font-size: 0.83rem; color: #aaa; text-align: center; padding: 10px; }

/* Notas */
.notas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
.nota-box { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 12px 8px; text-align: center; }
.nota-label { font-size: 0.72rem; color: #888; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.nota-valor { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; }
.nota-valor .pendiente { font-size: 0.85rem; color: #bbb; font-weight: 400; }
.promedio-row { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 12px 16px; }
.promedio-label { font-size: 0.82rem; color: #666; font-weight: 600; }
.promedio-valor { font-size: 1.35rem; font-weight: 700; }
.estado-badge { font-size: 0.78rem; font-weight: 700; padding: 5px 14px; border-radius: 99px; }
.aprobado { background: #e6f9f0; color: #1a9e5c; }
.reprobado { background: #fff0f0; color: #c0392b; }
.pendiente-badge { background: #fff8e1; color: #e67e22; }
.nota-pie { font-size: 0.76rem; color: #aaa; text-align: center; margin-top: 12px; }

@media (max-width: 420px) {
  .notas-grid { grid-template-columns: 1fr 1fr; }
  .menu-tabs { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <img id="logo-ibc" alt="Instituto Bíblico Concepción" src="">
    <h1>Instituto Bíblico Concepción</h1>
    <p class="sub1">Interdenominacional</p>
    <p class="sub2">Portal del Alumno</p>
  </div>

  <!-- ============ VISTA: INGRESO ============ -->
  <div class="card" id="vista-login">
    <label for="rut-input">Ingresa con tu RUT</label>
    <div class="input-row">
      <input type="text" id="rut-input" placeholder="12.345.678-9" maxlength="13" autocomplete="off">
      <button onclick="ingresar()">Ingresar →</button>
    </div>
    <div class="error" id="error-msg"></div>
    <p class="hint">Puedes escribirlo con o sin puntos, pero siempre con el guión (ej: 12.345.678-9).</p>
  </div>

  <!-- ============ VISTA: PANEL DEL ALUMNO ============ -->
  <div class="card" id="vista-panel">
    <div class="alumno-header">
      <div class="avatar" id="avatar"></div>
      <div>
        <div class="alumno-nombre" id="alumno-nombre"></div>
        <div class="alumno-rut" id="alumno-rut-display"></div>
      </div>
      <button class="btn-salir" onclick="salir()">Salir</button>
    </div>

    <div class="menu-tabs">
      <div class="tab active" id="tab-materiales" onclick="mostrarSeccion('materiales')">📚 Materias y<br>Materiales</div>
      <div class="tab" id="tab-notas" onclick="mostrarSeccion('notas')">📊 Mis<br>Calificaciones</div>
      <div class="tab" id="tab-asistencia" onclick="mostrarSeccion('asistencia')">🗓️ Mi<br>Asistencia</div>
      <div class="tab" id="tab-observaciones" onclick="mostrarSeccion('observaciones')">📝<br>Observaciones</div>
      <div class="tab" id="tab-avisos" onclick="mostrarSeccion('avisos')">📢 Avisos<br>Generales</div>
      <div class="tab" id="tab-horario" onclick="mostrarSeccion('horario')">🕒 Horario y<br>Modalidad</div>
    </div>

    <div id="seccion-materiales"></div>
    <div id="seccion-notas" style="display:none;"></div>
    <div id="seccion-asistencia" style="display:none;"></div>
    <div id="seccion-observaciones" style="display:none;"></div>
    <div id="seccion-avisos" style="display:none;"></div>
    <div id="seccion-horario" style="display:none;"></div>
  </div>

</div>

/* ===================== LÓGICA (no es necesario editar) ===================== */
let alumnoActual = null;

function normRut(r) { return r.replace(/[\s.]/g, '').toUpperCase(); }
function initials(n) { return n.split(/[\s,]+/).filter(Boolean).slice(0, 2).map(p => p[0]).join('').toUpperCase(); }
function fmtNota(v) { return (v === null || v === undefined) ? '<span class="pendiente">Pendiente</span>' : v; }

function ingresar() {
  const raw = document.getElementById('rut-input').value.trim();
  const err = document.getElementById('error-msg');
  err.style.display = 'none';
  if (!raw) { err.textContent = 'Por favor ingresa tu RUT.'; err.style.display = 'block'; return; }
  const key = Object.keys(alumnos).find(k => normRut(k) === normRut(raw));
  if (!key) {
    err.textContent = 'RUT no encontrado. Verifica que esté bien escrito, incluyendo el guión y el dígito verificador.';
    err.style.display = 'block';
    return;
  }
  alumnoActual = { rut: key, ...alumnos[key] };
  document.getElementById('avatar').textContent = initials(alumnoActual.nombre);
  document.getElementById('alumno-nombre').textContent = alumnoActual.nombre;
  document.getElementById('alumno-rut-display').textContent = 'RUT: ' + key;
  renderMateriales();
  renderNotas();
  renderAsistencia();
  renderObservaciones();
  renderAvisos();
  renderHorario();
  document.getElementById('vista-login').style.display = 'none';
  document.getElementById('vista-panel').style.display = 'block';
  mostrarSeccion('materiales');
}

function salir() {
  alumnoActual = null;
  document.getElementById('rut-input').value = '';
  document.getElementById('vista-panel').style.display = 'none';
  document.getElementById('vista-login').style.display = 'block';
  document.getElementById('rut-input').focus();
}

const SECCIONES = ['materiales', 'notas', 'asistencia', 'observaciones', 'avisos', 'horario'];
function mostrarSeccion(sec) {
  for (const s of SECCIONES) {
    document.getElementById('seccion-' + s).style.display = (s === sec) ? 'block' : 'none';
    document.getElementById('tab-' + s).classList.toggle('active', s === sec);
  }
}

function renderMateriales() {
  const cont = document.getElementById('seccion-materiales');
  let html = '';
  for (const curso of Object.keys(alumnoActual.cursos)) {
    const items = materiales[curso] || [];
    html += '<div class="curso-card"><div class="curso-titulo">📖 ' + curso + '</div>';
    if (items.length === 0) {
      html += '<p class="sin-materiales">Aún no hay materiales publicados para este curso.</p>';
    } else {
      for (const m of items) {
        html += '<div class="material-item">' +
          '<div class="material-icon">' + (iconos[m.tipo] || '📄') + '</div>' +
          '<div class="material-info"><div class="material-nombre">' + m.titulo + '</div>' +
          '<div class="material-desc">' + (m.desc || '') + '</div></div>' +
          '<a class="btn-descargar" href="' + m.url + '" target="_blank" rel="noopener" download>⬇ Descargar</a>' +
          '</div>';
      }
    }
    html += '</div>';
  }
  cont.innerHTML = html;
}

function renderNotas() {
  const cont = document.getElementById('seccion-notas');
  let html = '';
  for (const [curso, n] of Object.entries(alumnoActual.cursos)) {
    const disponibles = [n.t1, n.t2, n.ex].filter(v => v !== null && v !== undefined);
    const prom = disponibles.length ? disponibles.reduce((s, v) => s + v, 0) / disponibles.length : null;
    const aprobado = prom !== null ? prom >= 60 : null;
    let promHtml, badgeHtml;
    if (prom !== null) {
      const color = aprobado ? '#1a9e5c' : '#c0392b';
      promHtml = '<span style="color:' + color + '">' + prom.toFixed(1) + ' pts</span>';
      badgeHtml = '<span class="estado-badge ' + (aprobado ? 'aprobado">✓ Aprobado' : 'reprobado">✗ Reprobado') + '</span>';
    } else {
      promHtml = '<span style="color:#aaa">Sin datos</span>';
      badgeHtml = '<span class="estado-badge pendiente-badge">En curso</span>';
    }
    html += '<div class="curso-card">' +
      '<div class="curso-titulo">📖 ' + curso + '</div>' +
      '<div class="notas-grid">' +
        '<div class="nota-box"><div class="nota-label">Trabajo 1</div><div class="nota-valor">' + fmtNota(n.t1) + '</div></div>' +
        '<div class="nota-box"><div class="nota-label">Trabajo 2</div><div class="nota-valor">' + fmtNota(n.t2) + '</div></div>' +
        '<div class="nota-box"><div class="nota-label">Examen</div><div class="nota-valor">' + fmtNota(n.ex) + '</div></div>' +
      '</div>' +
      '<div class="promedio-row">' +
        '<div><div class="promedio-label">Promedio disponible</div><div class="promedio-valor">' + promHtml + '</div></div>' +
        badgeHtml +
      '</div>' +
      '</div>';
  }
  html += '<p class="nota-pie">Escala 0 – 100 pts · Nota mínima de aprobación: 60 pts · Las notas "Pendiente" aún no han sido registradas.</p>';
  cont.innerHTML = html;
}

function renderAsistencia() {
  const cont = document.getElementById('seccion-asistencia');
  const datosAlumno = asistencia[alumnoActual.rut] || {};
  let html = '';
  for (const curso of Object.keys(alumnoActual.cursos)) {
    const registros = datosAlumno[curso] || [];
    html += '<div class="curso-card"><div class="curso-titulo">📖 ' + curso + '</div>';
    if (registros.length === 0) {
      html += '<p class="sin-materiales">Aún no hay registros de asistencia para este curso.</p></div>';
      continue;
    }
    const presentes = registros.filter(r => r.estado === 'Presente').length;
    const pct = Math.round((presentes / registros.length) * 100);
    const color = pct >= 75 ? '#1a9e5c' : (pct >= 50 ? '#e67e22' : '#c0392b');
    html += '<div class="asistencia-summary"><div class="promedio-label">Asistencia registrada</div>' +
      '<div class="asistencia-pct" style="color:' + color + '">' + pct + '%</div></div>' +
      '<div class="asistencia-log">';
    for (const r of registros) {
      const cls = r.estado === 'Presente' ? 'presente' : (r.estado === 'Atraso' ? 'atraso' : 'ausente');
      const icono = r.estado === 'Presente' ? '✓' : (r.estado === 'Atraso' ? '⏱' : '✗');
      html += '<div class="asistencia-chip ' + cls + '"><span class="fecha">' + r.fecha + '</span>' + icono + ' ' + r.estado + '</div>';
    }
    html += '</div></div>';
  }
  cont.innerHTML = html;
}

function renderObservaciones() {
  const cont = document.getElementById('seccion-observaciones');
  if (observaciones.length === 0) {
    cont.innerHTML = '<p class="sin-avisos">No hay observaciones publicadas por el momento.</p>';

}

    cont.innerHTML = '<p class="sin-avisos">No hay avisos publicados por el momento.</p>';

  let html = '';

function renderHorario() {
  const cont = document.getElementById('seccion-horario');
  let html = '';
  for (const curso of Object.keys(alumnoActual.cursos)) {
    const h = horarios[curso];
    html += '<div class="curso-card"><div class="curso-titulo">📖 ' + curso + '</div>';
    if (!h) {
      html += '<p class="sin-materiales">Aún no hay horario publicado para este curso.</p></div>';
      continue;
    }
    const modCls = h.modalidad === 'Presencial' ? 'presencial' : (h.modalidad === 'Online' ? 'online' : 'hibrido');
    html += '<div class="horario-row">' +
      '<div class="horario-dia">' + h.dia + '</div>' +
      '<div class="horario-hora">' + h.hora + '</div>' +
      '<span class="modalidad-badge ' + modCls + '">' + h.modalidad + '</span>' +
      '<div class="horario-lugar">' + h.lugar + '</div>' +
      '</div></div>';
  }
  cont.innerHTML = html;
}

document.getElementById('rut-input').addEventListener('keydown', e => { if (e.key === 'Enter') ingresar(); });
document.getElementById('rut-input').addEventListener('input', () => { document.getElementById('error-msg').style.display = 'none'; });
